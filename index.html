<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <link rel="icon" href="/favicon.ico" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Biblioteca Inteligente de Consulta Normativa - Portal Premium Legal y Regulatorio</title>
  <meta name="description" content="La plataforma inteligente para consultar leyes, decretos, resoluciones y normas técnicas. Aprenda y reciba asesoría jurídica de primer nivel en segundos.">
  
  <!-- SEO & Open Graph -->
  <meta property="og:title" content="Biblioteca Inteligente de Consulta Normativa">
  <meta property="og:description" content="Consulta de leyes, decretos, resoluciones, normas técnicas, jurisprudencia y conceptos en segundos con el poder de la Inteligencia Artificial.">
  <meta property="og:type" content="website">

  <!-- Google Fonts - Outfit and Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  
  <!-- Lucide Icons CDN -->
  <script src="https://unpkg.com/lucide@latest"></script>

  <!-- Schema.org LegalDocument & WebSite Integration -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebSite",
    "name": "Biblioteca Inteligente de Consulta Normativa",
    "url": "https://legalcol.consultanormativa.com",
    "potentialAction": {
      "@type": "SearchAction",
      "target": "https://legalcol.consultanormativa.com/?search={search_term_string}",
      "query-input": "required name=search_term_string"
    }
  }
  </script>
</head>
<body>
  <div id="app"></div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
